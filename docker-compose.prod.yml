# Production stack: use with .env on the server (see .env.example).
# Usage: docker compose -f docker-compose.prod.yml up -d --build

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-equipment}
      POSTGRES_USER: ${POSTGRES_USER:-equipment_app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    volumes:
      - equipment_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-equipment_app} -d ${POSTGRES_DB:-equipment}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    image: tirotiro-oro:prod
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-equipment}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-equipment_app}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_LIQUIBASE_CONTEXTS: ${SPRING_LIQUIBASE_CONTEXTS:-}
      APP_BOOTSTRAP_ADMIN_EMAIL: ${APP_BOOTSTRAP_ADMIN_EMAIL:?Set APP_BOOTSTRAP_ADMIN_EMAIL in .env}
      APP_BOOTSTRAP_ADMIN_PASSWORD: ${APP_BOOTSTRAP_ADMIN_PASSWORD:?Set APP_BOOTSTRAP_ADMIN_PASSWORD in .env}
      APP_BOOTSTRAP_ADMIN_NAME: ${APP_BOOTSTRAP_ADMIN_NAME:-Admin}
      SERVER_PORT: 8080
    ports:
      - "${APP_HTTP_PORT:-8080}:8080"

volumes:
  equipment_postgres_data:
