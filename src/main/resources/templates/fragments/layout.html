<!doctype html>
<html lang="ru" xmlns:th="https://www.thymeleaf.org" xmlns:sec="https://www.thymeleaf.org/extras/spring-security">
<head th:fragment="head(title)">
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${title}">Склад оборудования</title>
    <link rel="stylesheet" th:href="@{/css/application.css}">
    <script defer th:src="@{/webjars/htmx.org/2.0.4/dist/htmx.min.js}"></script>
    <script defer th:src="@{/js/reason-dialog.js}"></script>
</head>
<body>
<header class="topbar" th:fragment="header">
    <a class="brand" th:href="@{/equipment}" th:text="#{app.title}">Склад оборудования</a>
    <nav class="nav">
        <a th:href="@{/equipment}" th:text="#{nav.catalog}">Каталог</a>
        <a th:href="@{/bookings}" th:text="#{nav.bookings}">Бронирования</a>
        <a th:href="@{/calendar}" th:text="#{nav.calendar}">Календарь</a>
        <a sec:authorize="hasRole('ADMIN')" th:href="@{/admin/equipment}" th:text="#{nav.admin}">Администрирование</a>
    </nav>
    <form th:action="@{/logout}" method="post" class="logout">
        <span th:text="${currentUserDisplayName}">Пользователь</span>
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <button type="submit" th:text="#{nav.signOut}">Выйти</button>
    </form>
</header>
<section th:fragment="flash" class="flash-region">
    <p class="flash success" th:if="${message}" th:text="${message}"></p>
    <p class="flash error" th:if="${error}" th:text="${error}"></p>
</section>
</body>
</html>
