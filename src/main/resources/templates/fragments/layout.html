<!doctype html>
<html lang="en" xmlns:th="https://www.thymeleaf.org" xmlns:sec="https://www.thymeleaf.org/extras/spring-security">
<head th:fragment="head(title)">
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${title}">Equipment Warehouse</title>
    <link rel="stylesheet" th:href="@{/css/application.css}">
    <script defer th:src="@{/webjars/htmx.org/dist/htmx.min.js}"></script>
</head>
<body>
<header class="topbar" th:fragment="header">
    <a class="brand" th:href="@{/equipment}">Equipment Warehouse</a>
    <nav class="nav">
        <a th:href="@{/equipment}">Catalog</a>
        <a th:href="@{/bookings}">Bookings</a>
        <a th:href="@{/calendar}">Calendar</a>
        <a sec:authorize="hasRole('ADMIN')" th:href="@{/admin/equipment}">Admin</a>
    </nav>
    <form th:action="@{/logout}" method="post" class="logout">
        <span th:text="${currentUserDisplayName}">User</span>
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <button type="submit">Sign out</button>
    </form>
</header>
<section th:fragment="flash" class="flash-region">
    <p class="flash success" th:if="${message}" th:text="${message}"></p>
    <p class="flash error" th:if="${error}" th:text="${error}"></p>
</section>
</body>
</html>
