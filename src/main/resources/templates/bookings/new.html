<!doctype html>
<html lang="ru" xmlns:th="https://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(#{bookings.form.title})}"></head>
<body>
<header th:replace="~{fragments/layout :: header}"></header>
<main class="page narrow">
    <section th:replace="~{fragments/layout :: flash}"></section>
    <h1 th:text="#{bookings.form.heading}">Новое бронирование</h1>
    <p class="flash error" th:if="${error}" th:text="${error}"></p>
    <form th:action="@{/bookings}" th:object="${form}" method="post" class="card stack">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <section th:replace="~{bookings/partials/form-fields :: bookingFormFields}"></section>
        <button type="submit" th:text="#{bookings.form.submit}">Создать бронирование</button>
    </form>
</main>
</body>
</html>
