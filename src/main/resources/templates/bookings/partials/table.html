<!doctype html>
<html lang="en" xmlns:th="https://www.thymeleaf.org">
<body>
<section id="bookings-table" th:fragment="bookingsTable" class="card">
    <table>
        <thead><tr><th>Period</th><th>User</th><th>Items</th><th>Status</th><th>Cancel</th></tr></thead>
        <tbody>
        <tr th:each="booking : ${bookings}">
            <td>
                <strong th:text="${#temporals.format(booking.startsAt, 'yyyy-MM-dd HH:mm')}">Start</strong>
                <span> to </span>
                <span th:text="${#temporals.format(booking.endsAt, 'yyyy-MM-dd HH:mm')}">End</span>
            </td>
            <td th:text="${booking.user.displayName}">User</td>
            <td>
                <div th:each="line : ${booking.lines}" th:text="${line.equipmentItem.name + ' x ' + line.quantity}">Line</div>
            </td>
            <td><span class="pill" th:text="${booking.status}">BOOKED</span></td>
            <td>
                <form th:if="${booking.status.name() == 'BOOKED'}" th:action="@{/bookings/{id}/cancel(id=${booking.id})}" method="post" class="inline-form">
                    <input name="reason" placeholder="Reason">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <button class="danger" type="submit">Cancel</button>
                </form>
            </td>
        </tr>
        <tr th:if="${#lists.isEmpty(bookings)}"><td colspan="5" class="empty">No bookings yet.</td></tr>
        </tbody>
    </table>
</section>
</body>
</html>
