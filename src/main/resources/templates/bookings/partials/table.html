<!doctype html>
<html lang="ru" xmlns:th="https://www.thymeleaf.org">
<body>
<section id="bookings-table" th:fragment="bookingsTable" class="card">
    <table>
        <thead><tr><th th:text="#{bookings.table.period}">Период</th><th th:text="#{bookings.table.user}">Пользователь</th><th th:text="#{bookings.table.items}">Позиции</th><th th:text="#{bookings.table.status}">Статус</th><th th:text="#{bookings.table.cancel}">Отмена</th></tr></thead>
        <tbody>
        <tr th:each="booking : ${bookings}">
            <td>
                <strong th:text="${#temporals.format(booking.startsAt, 'yyyy-MM-dd HH:mm')}">Начало</strong>
                <span th:text="${' ' + #messages.msg('bookings.table.to') + ' '}"> по </span>
                <span th:text="${#temporals.format(booking.endsAt, 'yyyy-MM-dd HH:mm')}">Окончание</span>
            </td>
            <td th:text="${booking.user.displayName}">Пользователь</td>
            <td>
                <div th:each="line : ${booking.lines}" th:text="${line.equipmentItem.name + ' x ' + line.quantity}">Строка</div>
            </td>
            <td><span class="pill" th:text="${#messages.msg('enum.BookingStatus.' + booking.status.name())}">Забронировано</span></td>
            <td>
                <form th:if="${booking.status.name() == 'BOOKED'}" th:action="@{/bookings/{id}/cancel(id=${booking.id})}" method="post" class="inline-form">
                    <input name="reason" th:placeholder="#{bookings.table.reason}">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <button class="danger" type="submit" th:text="#{bookings.table.cancelButton}">Отменить</button>
                </form>
            </td>
        </tr>
        <tr th:if="${#lists.isEmpty(bookings)}"><td colspan="5" class="empty" th:text="#{bookings.table.empty}">Бронирований пока нет.</td></tr>
        </tbody>
    </table>
</section>
</body>
</html>
