<!doctype html>
<html lang="ru" xmlns:th="https://www.thymeleaf.org" xmlns:sec="https://www.thymeleaf.org/extras/spring-security">
<body>
<section id="bookings-table" th:fragment="bookingsTable" class="card">
    <table>
        <thead><tr><th th:text="#{bookings.table.period}">Период</th><th th:text="#{bookings.table.user}">Пользователь</th><th th:text="#{bookings.table.items}">Позиции</th><th th:text="#{bookings.table.status}">Статус</th><th th:text="#{bookings.table.cancel}">Отмена</th><th sec:authorize="hasRole('ADMIN')" th:text="#{bookings.table.delete}">Удаление</th></tr></thead>
        <tbody>
        <tr th:each="booking : ${bookings}">
            <td>
                <strong th:text="${#temporals.format(booking.startsAt, 'yyyy-MM-dd HH:mm')}">Начало</strong>
                <span th:text="${' ' + #messages.msg('bookings.table.to') + ' '}"> по </span>
                <span th:text="${#temporals.format(booking.endsAt, 'yyyy-MM-dd HH:mm')}">Окончание</span>
            </td>
            <td th:text="${booking.user.displayName}">Пользователь</td>
            <td>
                <div th:each="line : ${booking.lines}" class="booking-item-line">
                    <a th:href="@{/equipment/{id}(id=${line.equipmentItem.id})}"
                       th:text="${line.equipmentItem.name}">Оборудование</a>
                    <span th:text="${' x ' + line.quantity}"> x 1</span>
                    <span class="muted"
                          th:text="${' · ' + #messages.msg('bookings.table.owner') + ': ' + line.equipmentItem.owner.displayName}"> · Владелец</span>
                </div>
            </td>
            <td><span class="pill" th:text="${#messages.msg('enum.BookingStatus.' + booking.status.name())}">Забронировано</span></td>
            <td class="actions">
                <button th:if="${booking.status.name() == 'BOOKED'}"
                        type="button"
                        class="danger subtle btn-sm"
                        data-reason-dialog
                        th:data-action="@{/bookings/{id}/cancel(id=${booking.id})}"
                        th:data-title="#{bookings.dialog.cancel.title}"
                        th:data-reason-required="${isAdmin}"
                        th:text="#{bookings.table.cancelButton}">Отменить</button>
            </td>
            <td sec:authorize="hasRole('ADMIN')" class="actions">
                <button type="button"
                        class="danger subtle btn-sm"
                        data-reason-dialog
                        th:data-action="@{/admin/bookings/{id}/delete(id=${booking.id})}"
                        th:data-title="#{bookings.dialog.delete.title}"
                        th:data-message="#{confirm.admin.bookings.delete}"
                        data-reason-required="true"
                        th:text="#{bookings.table.deleteButton}">Удалить</button>
            </td>
        </tr>
        <tr th:if="${#lists.isEmpty(bookings)}"><td th:colspan="${isAdmin ? 6 : 5}" class="empty" th:text="#{bookings.table.empty}">Бронирований пока нет.</td></tr>
        </tbody>
    </table>
    <div th:replace="~{fragments/reason-dialog :: reasonDialog}"></div>
</section>
</body>
</html>
