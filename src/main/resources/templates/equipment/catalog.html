<!doctype html>
<html lang="en" xmlns:th="https://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Equipment Catalog')}"></head>
<body>
<header th:replace="~{fragments/layout :: header}"></header>
<main class="page">
    <section th:replace="~{fragments/layout :: flash}"></section>
    <div class="page-title">
        <div>
            <h1>Equipment Catalog</h1>
            <p class="muted">Browse active warehouse equipment and open details before booking.</p>
        </div>
        <a class="button" th:if="${canCreateEquipment}" th:href="@{/equipment/new}">Add equipment</a>
    </div>
    <button class="secondary" hx-get="/equipment/table" hx-target="#equipment-table" hx-swap="outerHTML">Refresh table</button>
    <section th:replace="~{equipment/partials/table :: equipmentTable}"></section>
</main>
</body>
</html>
