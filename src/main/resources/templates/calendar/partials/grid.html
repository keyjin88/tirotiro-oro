<!doctype html>
<html lang="en" xmlns:th="https://www.thymeleaf.org">
<body>
<section id="calendar-grid" th:fragment="calendarGrid" class="card">
    <h2 th:text="${#temporals.format(startsOn, 'yyyy-MM-dd') + ' to ' + #temporals.format(endsOn, 'yyyy-MM-dd')}">Period</h2>
    <table>
        <thead><tr><th>Equipment</th><th>Category</th><th>Total</th><th>Booked</th><th>Available</th></tr></thead>
        <tbody>
        <tr th:each="item : ${calendar.items}">
            <td th:text="${item.equipmentName}">Equipment</td>
            <td th:text="${item.categoryName}">Category</td>
            <td th:text="${item.total}">0</td>
            <td th:text="${item.booked}">0</td>
            <td><strong th:text="${item.available}">0</strong></td>
        </tr>
        <tr th:if="${#lists.isEmpty(calendar.items)}"><td colspan="5" class="empty">No equipment for this period.</td></tr>
        </tbody>
    </table>
</section>
</body>
</html>
