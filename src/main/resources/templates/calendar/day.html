<!doctype html>
<html lang="ru" xmlns:th="https://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(#{calendar.day.title})}"></head>
<body>
<header th:replace="~{fragments/layout :: header}"></header>
<main class="page">
    <section th:replace="~{fragments/layout :: flash}"></section>
    <div class="page-title">
        <div>
            <a class="muted"
               th:href="@{/calendar(month=${day.month}, status=${day.filter.status}, userId=${day.filter.userId}, fromDate=${day.filter.fromDate}, toDate=${day.filter.toDate}, equipmentItemId=${day.filter.equipmentItemId})}"
               th:text="#{calendar.backToMonth}">Назад к месяцу</a>
            <h1 th:text="#{calendar.day.heading(${#temporals.format(day.date, 'dd.MM.yyyy')})}">Бронирования на день</h1>
            <p class="muted" th:text="#{calendar.day.subtitle}">Подробная информация по бронированиям выбранного дня.</p>
        </div>
        <button type="button"
                class="icon-button"
                data-booking-dialog
                th:attr="data-date=${day.date}, data-return-url=@{/calendar/day/{date}(date=${day.date}, status=${day.filter.status}, userId=${day.filter.userId}, fromDate=${day.filter.fromDate}, toDate=${day.filter.toDate}, equipmentItemId=${day.filter.equipmentItemId})}"
                th:aria-label="#{calendar.addBooking}"
                th:title="#{calendar.addBooking}">+</button>
    </div>
    <section class="card">
        <table>
            <thead>
            <tr>
                <th th:text="#{calendar.day.period}">Период</th>
                <th th:text="#{calendar.day.user}">Пользователь</th>
                <th th:text="#{calendar.day.items}">Оборудование</th>
                <th th:text="#{calendar.day.comment}">Комментарий</th>
                <th th:text="#{calendar.day.delete}">Удаление</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="booking : ${day.bookings}">
                <td>
                    <strong th:text="${#temporals.format(booking.startsAt, 'yyyy-MM-dd HH:mm')}">Начало</strong>
                    <span th:text="${' ' + #messages.msg('bookings.table.to') + ' '}"> по </span>
                    <span th:text="${#temporals.format(booking.endsAt, 'yyyy-MM-dd HH:mm')}">Окончание</span>
                </td>
                <td th:text="${booking.userDisplayName}">Пользователь</td>
                <td>
                    <div class="stack compact">
                        <div th:each="line : ${booking.lines}">
                            <a th:href="@{/equipment/{id}(id=${line.equipmentItemId})}"
                               th:text="${line.equipmentName}">Оборудование</a>
                            <span class="muted" th:text="${' · ' + line.categoryName}"> · Категория</span>
                            <span class="muted"
                                  th:text="${' · ' + #messages.msg('calendar.day.owner') + ': ' + line.ownerDisplayName}"> · Владелец</span>
                            <span th:text="${' x ' + line.quantity}"> x 1</span>
                            <span class="pill" th:if="${line.inventoryNumber != null}" th:text="${line.inventoryNumber}">INV-1</span>
                        </div>
                    </div>
                </td>
                <td th:text="${booking.comment ?: #messages.msg('calendar.day.noComment')}">Комментарий</td>
                <td class="actions">
                    <button th:if="${booking.deletable}"
                            type="button"
                            class="danger subtle btn-sm"
                            data-reason-dialog
                            th:with="returnUrl=@{/calendar/day/{date}(date=${day.date}, status=${day.filter.status}, userId=${day.filter.userId}, fromDate=${day.filter.fromDate}, toDate=${day.filter.toDate}, equipmentItemId=${day.filter.equipmentItemId})}"
                            th:data-action="@{/bookings/{id}/delete(id=${booking.id}, returnUrl=${returnUrl})}"
                            th:data-title="#{bookings.dialog.delete.title}"
                            th:data-message="#{confirm.admin.bookings.delete}"
                            data-reason-required="true"
                            th:text="#{calendar.day.deleteButton}">Удалить</button>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(day.bookings)}">
                <td colspan="5" class="empty" th:text="#{calendar.day.empty}">На этот день бронирований нет.</td>
            </tr>
            </tbody>
        </table>
    </section>
    <div th:replace="~{fragments/booking-dialog-shell :: bookingDialogShell}"></div>
    <div th:replace="~{fragments/reason-dialog :: reasonDialog}"></div>
</main>
</body>
</html>
