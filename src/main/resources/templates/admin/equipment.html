<!doctype html>
<html lang="ru" xmlns:th="https://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(#{admin.equipment.title})}"></head>
<body>
<header th:replace="~{fragments/layout :: header}"></header>
<main class="page">
    <section th:replace="~{fragments/layout :: flash}"></section>
    <div class="page-title">
        <div>
            <h1 th:text="#{admin.equipment.heading}">Оборудование</h1>
            <p class="muted" th:text="#{admin.equipment.subtitle}">Управляйте настройкой каталога, категориями и инвентарем с поштучным учетом.</p>
        </div>
        <a class="button secondary" th:href="@{/admin/users}" th:text="#{admin.equipment.manageUsers}">Управлять пользователями</a>
    </div>
    <section class="grid two">
        <form th:action="@{/admin/categories}" th:object="${categoryForm}" method="post" class="card stack">
            <h2 th:text="#{admin.equipment.createCategory}">Создать категорию</h2>
            <label><span th:text="#{admin.equipment.name}">Название</span> <input th:field="*{name}" required>
                <span class="field-error" th:if="${#fields.hasErrors('name')}" th:errors="*{name}">Введите название категории.</span>
            </label>
            <label><span th:text="#{admin.equipment.description}">Описание</span> <textarea th:field="*{description}"></textarea></label>
            <button type="submit" th:text="#{admin.equipment.createCategory}">Создать категорию</button>
        </form>
        <form th:action="@{/admin/equipment}" th:object="${equipmentForm}" method="post" class="card stack">
            <h2 th:text="#{admin.equipment.createEquipment}">Создать оборудование</h2>
            <label><span th:text="#{admin.equipment.category}">Категория</span>
                <select th:field="*{categoryId}" required>
                    <option value="" th:text="#{equipment.form.selectCategory}">Выберите категорию</option>
                    <option th:each="category : ${categories}" th:value="${category.id}" th:text="${category.name}">Категория</option>
                </select>
                <span class="field-error" th:if="${#fields.hasErrors('categoryId')}" th:errors="*{categoryId}">Выберите категорию.</span>
            </label>
            <label><span th:text="#{admin.equipment.name}">Название</span> <input th:field="*{name}" required>
                <span class="field-error" th:if="${#fields.hasErrors('name')}" th:errors="*{name}">Введите название оборудования.</span>
            </label>
            <label><span th:text="#{admin.equipment.manufacturer}">Производитель</span> <input th:field="*{manufacturer}"></label>
            <label><span th:text="#{admin.equipment.model}">Модель</span> <input th:field="*{model}"></label>
            <label><span th:text="#{admin.equipment.tracking}">Учет</span>
                <select th:field="*{trackingMode}">
                    <option th:each="mode : ${trackingModes}" th:value="${mode}" th:text="${#messages.msg('enum.TrackingMode.' + mode.name())}">Количественный учет</option>
                </select>
                <span class="field-error" th:if="${#fields.hasErrors('trackingMode')}" th:errors="*{trackingMode}">Выберите тип учета.</span>
            </label>
            <label><span th:text="#{admin.equipment.totalQuantity}">Общее количество</span> <input type="number" min="0" th:field="*{totalQuantity}">
                <span class="field-error" th:if="${#fields.hasErrors('totalQuantity')}" th:errors="*{totalQuantity}">Общее количество не должно быть отрицательным.</span>
            </label>
            <button type="submit" th:text="#{admin.equipment.createEquipment}">Создать оборудование</button>
        </form>
    </section>
    <section class="card">
        <h2 th:text="#{admin.equipment.catalogAdministration}">Администрирование каталога</h2>
        <table>
            <thead><tr><th th:text="#{admin.equipment.name}">Название</th><th th:text="#{admin.equipment.category}">Категория</th><th th:text="#{admin.equipment.tracking}">Учет</th><th th:text="#{admin.equipment.active}">Активно</th><th th:text="#{admin.equipment.addUnit}">Добавить единицу</th><th th:text="#{admin.equipment.archive}">Архивировать</th></tr></thead>
            <tbody>
            <tr th:each="item : ${items}">
                <td><a th:href="@{/equipment/{id}(id=${item.id})}" th:text="${item.name}">Позиция</a></td>
                <td th:text="${item.category.name}">Категория</td>
                <td th:text="${#messages.msg('enum.TrackingMode.' + item.trackingMode.name())}">Количественный учет</td>
                <td th:text="${item.active}">true</td>
                <td>
                    <form th:if="${item.trackingMode.name() == 'UNIT' and item.active}" th:action="@{/admin/equipment/{id}/units(id=${item.id})}" th:object="${unitForm}" method="post" class="inline-form wrap">
                        <input th:field="*{inventoryNumber}" th:placeholder="#{admin.equipment.inventoryNumber}" required>
                        <input th:field="*{condition}" th:placeholder="#{admin.equipment.condition}" required>
                        <select th:field="*{status}"><option th:each="status : ${unitStatuses}" th:value="${status}" th:text="${#messages.msg('enum.EquipmentUnitStatus.' + status.name())}">Доступна</option></select>
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                        <button type="submit" th:text="#{admin.equipment.addUnit}">Добавить единицу</button>
                    </form>
                </td>
                <td>
                    <form th:if="${item.active}" th:action="@{/admin/equipment/{id}/delete(id=${item.id})}" method="post" class="inline-form">
                        <input name="reason" th:placeholder="#{admin.equipment.reason}" required>
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                        <button type="submit" class="danger" th:text="#{admin.equipment.archive}">Архивировать</button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
    </section>
</main>
</body>
</html>
