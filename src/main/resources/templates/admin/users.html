<!doctype html>
<html lang="ru" xmlns:th="https://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(#{admin.users.title})}"></head>
<body>
<header th:replace="~{fragments/layout :: header}"></header>
<main class="page">
    <section th:replace="~{fragments/layout :: flash}"></section>
    <div class="page-title">
        <div>
            <h1 th:text="#{admin.users.heading}">Пользователи</h1>
            <p class="muted" th:text="#{admin.users.subtitle}">Просматривайте учетные записи и выдавайте или отзывайте права MVP.</p>
        </div>
        <a class="button secondary" th:href="@{/admin/equipment}" th:text="#{admin.users.manageEquipment}">Управлять оборудованием</a>
    </div>
    <section class="card">
        <table>
            <thead><tr><th th:text="#{admin.users.user}">Пользователь</th><th th:text="#{admin.users.roles}">Роли</th><th th:text="#{admin.users.permissions}">Права</th><th th:text="#{admin.users.roleActions}">Роли</th><th th:text="#{admin.users.permissionActions}">Права</th></tr></thead>
            <tbody>
            <tr th:each="user : ${users}">
                <td>
                    <strong th:text="${user.displayName}">Пользователь</strong>
                    <div class="muted" th:text="${user.email}">email@example.com</div>
                </td>
                <td><span class="pill" th:each="role : ${user.roles}" th:text="${role.code}">USER</span></td>
                <td><span class="pill" th:each="grant : ${user.permissionGrants}" th:text="${grant.permission.code}">EQUIPMENT_CREATE</span></td>
                <td>
                    <div class="muted" th:text="#{admin.users.roleActions}">Роли</div>
                    <form th:each="code : ${roleCodes}" th:action="@{/admin/users/{id}/roles(id=${user.id})}" method="post" class="inline-form wrap">
                        <input type="hidden" name="roleCode" th:value="${code}">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                        <button name="action" value="grant" type="submit"><span th:text="#{admin.users.grant}">Выдать</span> <span th:text="${code}">Роль</span></button>
                        <button name="action" value="revoke" type="submit" class="danger"><span th:text="#{admin.users.revoke}">Отозвать</span> <span th:text="${code}">Роль</span></button>
                    </form>
                </td>
                <td>
                    <div class="muted" th:text="#{admin.users.permissionActions}">Права</div>
                    <form th:each="code : ${permissionCodes}" th:action="@{/admin/users/{id}/permissions(id=${user.id})}" method="post" class="inline-form">
                        <input type="hidden" name="permissionCode" th:value="${code}">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                        <button name="action" value="grant" type="submit"><span th:text="#{admin.users.grant}">Выдать</span> <span th:text="${code}">Право</span></button>
                        <button name="action" value="revoke" type="submit" class="danger" th:text="#{admin.users.revoke}">Отозвать</button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
    </section>
</main>
</body>
</html>
