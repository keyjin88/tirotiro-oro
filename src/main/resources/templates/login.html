<!doctype html>
<html lang="en" xmlns:th="https://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Sign in')}"></head>
<body>
<main class="auth-card">
    <h1>Sign in</h1>
    <p class="muted">Use your warehouse account to continue.</p>
    <p class="flash error" th:if="${param.error}">Invalid email or password.</p>
    <p class="flash success" th:if="${param.logout}">You have signed out.</p>
    <form th:action="@{/login}" method="post" class="stack">
        <label>Email <input name="username" type="email" autocomplete="username" required autofocus></label>
        <label>Password <input name="password" type="password" autocomplete="current-password" required></label>
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <button type="submit">Sign in</button>
    </form>
</main>
</body>
</html>
