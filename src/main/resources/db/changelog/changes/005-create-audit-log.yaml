databaseChangeLog:
  - changeSet:
      id: 005-create-audit-log
      author: cursor
      changes:
        - createTable:
            tableName: audit_log
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: actor_user_id
                  type: uuid
              - column:
                  name: action
                  type: varchar(100)
                  constraints:
                    nullable: false
              - column:
                  name: entity_type
                  type: varchar(100)
                  constraints:
                    nullable: false
              - column:
                  name: entity_id
                  type: uuid
              - column:
                  name: details
                  type: jsonb
              - column:
                  name: created_at
                  type: timestamptz
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: audit_log
            baseColumnNames: actor_user_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_audit_log_actor
        - createIndex:
            tableName: audit_log
            indexName: idx_audit_log_actor_user_id
            columns:
              - column:
                  name: actor_user_id
        - createIndex:
            tableName: audit_log
            indexName: idx_audit_log_entity
            columns:
              - column:
                  name: entity_type
              - column:
                  name: entity_id
        - createIndex:
            tableName: audit_log
            indexName: idx_audit_log_created_at
            columns:
              - column:
                  name: created_at
